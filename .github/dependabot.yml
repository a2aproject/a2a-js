version: 2
updates:
  - package-ecosystem: 'npm'
    directories:
      - '/'
      - '/src/samples'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 0
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      security-patches:
        applies-to: security-updates
        patterns:
          - '*'
