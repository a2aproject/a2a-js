version: 2
updates:
  - package-ecosystem: 'npm'
    directories:
      - '/'
      - '/src/samples'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    groups:
      npm-minor-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
