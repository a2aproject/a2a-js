# buf generate
# Configuration for the buf generate command
# Uses remote plugins, no separate install required.
version: v2
inputs:
  - git_repo: https://github.com/a2aproject/A2A.git
    ref: v1.0.0
    subdir: specification
  - module: buf.build/googleapis/googleapis
    paths:
      - google/rpc/status.proto
      - google/rpc/error_details.proto
plugins:
  - remote: buf.build/community/stephenh-ts-proto:v2.6.1
    opt: 
      - oneof=unions-value
      - importSuffix=.js
      - outputServices=grpc-js
      - env=node
      - esModuleInterop=true
      - outputJsonMethods=false
      - outputPartialMethods=false
      - useDate=string
    out: ./pb